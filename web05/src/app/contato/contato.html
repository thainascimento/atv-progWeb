<h3>Contato</h3>

<div class="alert alert-success" *ngIf="mensagem.length>0">
  <b>{{mensagem}}</b>
</div>

<br><br>
Preencha o formulario abaixo para receber nossa comunicação.
<br><br>

<form>

  <div class="row mb-3">
    <label class="col-sm-2 col-form-label">nome:</label>
    <div class="col-sm-10">
      <input type="text" [(ngModel)]="nome" class="form-control" placeholder="digite seu nome completo">
    </div>
  </div>

  <div class="row mb-3">
    <label class="col-sm-2 col-form-label">email:</label>
    <div class="col-sm-10">
      <input type="email" [(ngModel)]="email" class="form-control">
    </div>
  </div>

  <div class="row mb-3">
    <label class="col-sm-2 col-form-label">telefone:</label>
    <div class="col-sm-10">
      <input type="text" [(ngModel)]="telefone" class="form-control">
    </div>
  </div>

  <div class="row mb-3">
    <label class="col-sm-2 col-form-label">assunto:</label>
    <div class="col-sm-10">
      <select [(ngModel)]="titulo" class="form-control">
        <option>Problemas com produtos</option>
        <option>Problemas com pedidos</option>
        <option>Problemas com cadastros</option>
        <option>duvidas e sugestões</option>
      </select>
    </div>
  </div>

  <div class="row mb-3">
    <label class="col-sm-2 col-form-label">mensagem:</label>
    <div class="col-sm-10">
      <textarea rows="5" cols="80" [(ngModel)]="texto" class="form-control"></textarea>
    </div>
  </div>

  <div class="row mb-3">
    <div class="col-sm-10 offset-sm-2">
      <div class="form-check">
        <input type="checkbox" [(ngModel)]="copia" class="form-check-input">
        <label class="form-check-label" >  deseja receber uma copia do email?? </label>
      </div>
    </div>
  </div>

  <button (click)="enviar();" class="btn btn-outline-success">Enviar</button>

</form>
