<h4>{{mensagem}}</h4>
<div class="row">
@for (obj of lista; track obj.codigo) {
    <div class="card col-md-3 col-sm-12 col-xl-2" width="400px">
        <h4 class="card-title">{{obj.nome}}</h4>
        <img src="produto_{{obj.codigo}}.jpg" class="card-img-top" width="150px" height="150ox"><br>
       <div class="card-text">
        @if(obj.promo<obj.valor){
            de: <s>R$ {{obj.valor}}</s> <br>
            por: R$ {{obj.promo}}
        } @else {
            R$ {{obj.valor}}
        }<br>
        @if(obj.quantidade > 0){
            <button class="btn btn-outline-success">Comprar</button>
        } @else {
            <b>Sem Estoque</b>  
        }
        </div>
    </div>
}
</div>
